---
type: specs.openrewrite.org/v1beta/recipe
name: net.unit8.rotom.EnkanMigration015
displayName: Migrate to enkan 0.15.0
description: >
  Migrate package names changed in enkan 0.15.0 (JPMS split-package resolution).
  Uses text-based find-and-replace so it works even when the project does not
  compile against the old packages.
recipeList:
  # ── enkan.data.* ────────────────────────────────────────────────────────────
  - org.openrewrite.text.FindAndReplace:
      find: "import enkan.data.HttpRequest;"
      replace: "import enkan.web.data.HttpRequest;"
      filePattern: "**/*.java"

  - org.openrewrite.text.FindAndReplace:
      find: "import enkan.data.HttpResponse;"
      replace: "import enkan.web.data.HttpResponse;"
      filePattern: "**/*.java"

  - org.openrewrite.text.FindAndReplace:
      find: "import enkan.data.Cookie;"
      replace: "import enkan.web.data.Cookie;"
      filePattern: "**/*.java"

  - org.openrewrite.text.FindAndReplace:
      find: "import enkan.data.DefaultHttpRequest;"
      replace: "import enkan.web.data.DefaultHttpRequest;"
      filePattern: "**/*.java"

  - org.openrewrite.text.FindAndReplace:
      find: "import enkan.data.DefaultHttpResponse;"
      replace: "import enkan.web.data.DefaultHttpResponse;"
      filePattern: "**/*.java"

  - org.openrewrite.text.FindAndReplace:
