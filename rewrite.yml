  # wildcard import
  - org.openrewrite.text.FindAndReplace:
      find: "import enkan.data.*;"
      replace: "import enkan.web.data.*;"
      filePattern: "**/*.java"

  # ── enkan.application.* ─────────────────────────────────────────────────────
