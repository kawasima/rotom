      replace: "import enkan.web.data.SecureCookie;"
      filePattern: "**/*.java"

  - org.openrewrite.text.FindAndReplace:
      find: "import enkan.data.SseEmitter;"
      replace: "import enkan.web.data.SseEmitter;"
      filePattern: "**/*.java"

  - org.openrewrite.text.FindAndReplace:
      find: "import enkan.data.SseEvent;"
      replace: "import enkan.web.data.SseEvent;"
      filePattern: "**/*.java"

  - org.openrewrite.text.FindAndReplace:
